<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektei System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Styles für das Betriebssystem-Feeling */
        body {
            user-select: none; /* Verhindert das Markieren von Text */
            overflow: hidden;
        }

        .os-bg {
            background: radial-gradient(circle at center, #1f2937 0%, #030712 100%);
        }

        /* Animation für falsches Passwort */
        @keyframes flashRed {
            0% { background-color: transparent; }
            50% { background-color: rgba(220, 38, 38, 0.4); }
            100% { background-color: transparent; }
        }

        .flash-error {
            animation: flashRed 0.4s ease-in-out;
        }

        /* Schüttel-Animation für falsches Passwort (Kindgerechtes Feedback) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Pulsierender Glow-Effekt für das wichtige Icon */
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.9)); transform: scale(1.05); }
        }
        .icon-highlight {
            animation: pulseGlow 2.5s infinite ease-in-out;
        }

        /* Desktop Icon Hover-Effekt */
        .desktop-icon:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            cursor: pointer;
        }

        /* Custom Scrollbar für das Textfeld */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* Desktop Hintergrundbild */
        #desktop-screen {
            background-image: url('desktop.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1f2937; /* Fallback-Farbe, falls das Bild nicht lädt */
        }
    </style>
</head>
<body class="h-screen w-screen bg-gray-900 text-white font-mono flex items-center justify-center relative os-bg">

    <!-- Roter Flash-Overlay bei falschem Passwort -->
    <div id="error-flash" class="absolute inset-0 pointer-events-none z-50"></div>

    <!-- Zwangsoverlay, falls Vollbild abgebrochen wird -->
    <div id="lock-overlay" class="hidden absolute inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <svg class="w-16 h-16 text-red-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <h1 class="text-3xl font-bold text-red-600 tracking-widest mb-2">SYSTEM HALT</h1>
        <p class="text-gray-400">Vollbildmodus erforderlich. Bitte drücke die Taste <kbd class="bg-gray-800 px-2 py-1 rounded text-white font-bold">0</kbd> um fortzufahren.</p>
    </div>

    <!-- ================= LOGIN SCREEN ================= -->
    <div id="login-screen" class="w-full max-w-md bg-gray-800 bg-opacity-80 p-8 rounded-lg shadow-2xl border border-gray-700 z-10 backdrop-blur-sm">
        <div class="text-center mb-8">
            <svg class="w-16 h-16 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <h2 class="text-2xl font-bold uppercase tracking-widest text-gray-200">DETEKTEI FALKENAUGE</h2>
            <p class="text-sm text-gray-500 mt-2 font-semibold uppercase tracking-wider">GEHEIMES PASSWORT ERFORDERLICH</p>
        </div>

        <div id="login-form" class="space-y-6">
            <div class="text-center">
                <div class="flex justify-center space-x-2 sm:space-x-4">
                    <!-- Ziffer 1 -->
                    <div class="flex flex-col items-center">
                        <button type="button" onclick="incrementDigit(0)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                        <div class="digit-display w-12 h-16 sm:w-14 sm:h-18 flex items-center justify-center text-3xl font-bold bg-gray-900 border-2 border-gray-600 rounded-md text-white shadow-inner select-none">0</div>
                        <button type="button" onclick="decrementDigit(0)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                    <!-- Ziffer 2 -->
                    <div class="flex flex-col items-center">
                        <button type="button" onclick="incrementDigit(1)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                        <div class="digit-display w-12 h-16 sm:w-14 sm:h-18 flex items-center justify-center text-3xl font-bold bg-gray-900 border-2 border-gray-600 rounded-md text-white shadow-inner select-none">0</div>
                        <button type="button" onclick="decrementDigit(1)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                    <!-- Ziffer 3 -->
                    <div class="flex flex-col items-center">
                        <button type="button" onclick="incrementDigit(2)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                        <div class="digit-display w-12 h-16 sm:w-14 sm:h-18 flex items-center justify-center text-3xl font-bold bg-gray-900 border-2 border-gray-600 rounded-md text-white shadow-inner select-none">0</div>
                        <button type="button" onclick="decrementDigit(2)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                    <!-- Ziffer 4 -->
                    <div class="flex flex-col items-center">
                        <button type="button" onclick="incrementDigit(3)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                        <div class="digit-display w-12 h-16 sm:w-14 sm:h-18 flex items-center justify-center text-3xl font-bold bg-gray-900 border-2 border-gray-600 rounded-md text-white shadow-inner select-none">0</div>
                        <button type="button" onclick="decrementDigit(3)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                    <!-- Ziffer 5 -->
                    <div class="flex flex-col items-center">
                        <button type="button" onclick="incrementDigit(4)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        </button>
                        <div class="digit-display w-12 h-16 sm:w-14 sm:h-18 flex items-center justify-center text-3xl font-bold bg-gray-900 border-2 border-gray-600 rounded-md text-white shadow-inner select-none">0</div>
                        <button type="button" onclick="decrementDigit(4)" class="text-gray-500 hover:text-white p-1 focus:outline-none active:scale-90 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-200 uppercase tracking-wider shadow-lg active:scale-95">
                PASSWORT PRÜFEN
            </button>
        </div>
    </div>

    <!-- ================= DESKTOP SCREEN ================= -->
    <div id="desktop-screen" class="hidden absolute inset-0 w-full h-full p-4">
        <!-- Desktop Icons (Grid) -->
        <div class="grid grid-cols-1 gap-4 w-32 content-start h-full z-10 relative">
            
            <!-- Deko Icon 1 -->
            <div class="desktop-icon flex flex-col items-center justify-center p-2 text-center group">
                <svg class="w-12 h-12 text-blue-400 mb-1 opacity-80 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                <span class="text-xs text-gray-300 drop-shadow-md">Datenbank</span>
            </div>

            <!-- Deko Icon 2 -->
            <div class="desktop-icon flex flex-col items-center justify-center p-2 text-center group">
                <svg class="w-12 h-12 text-gray-500 mb-1 opacity-80 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                <span class="text-xs text-gray-300 drop-shadow-md">Papierkorb</span>
            </div>
        </div>

        <!-- Zentriertes, auffälliges Icon (Textdatei) -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
            <div class="desktop-icon icon-highlight flex flex-col items-center justify-center p-4 text-center group pointer-events-auto" onclick="openApp('text-editor')">
                <svg class="w-20 h-20 text-blue-100 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="text-sm font-bold text-white drop-shadow-lg bg-gray-900 bg-opacity-70 px-3 py-1 rounded border border-gray-600">Fallakte_304.txt</span>
            </div>
        </div>

        <!-- Fiktives Textprogramm (Fenster) -->
        <div id="text-editor" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] max-w-[90vw] h-[400px] max-h-[90vh] bg-gray-800 border border-gray-600 rounded-lg shadow-2xl flex flex-col overflow-hidden z-20">
            <!-- Title Bar -->
            <div class="bg-gray-700 px-4 py-2 flex justify-between items-center cursor-default border-b border-gray-600">
                <div class="flex items-center space-x-2">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="text-sm font-semibold text-gray-200">Editor - Fallakte_304.txt</span>
                </div>
                <!-- Close Button -->
                <button onclick="closeApp('text-editor')" class="text-gray-400 hover:text-white hover:bg-red-500 p-1 rounded transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <!-- Content Area (Read-Only) -->
            <div class="flex-1 p-6 overflow-y-auto bg-gray-900 text-green-400 font-mono text-sm leading-relaxed">
                <p class="mb-4">Sala ist doof! ;)</p>
                <p class="mb-4">...</p>
                <p class="mb-4">...</p>
                <p class="mb-8">...</p>
                
                <div class="bg-gray-800 p-4 border-l-4 border-green-500 mb-8 italic">
                    "..."
                </div>
                
                <p class="text-gray-500 mt-8">--- ENDE DER DATEI ---</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Vollbild & Kiosk-Logik ---
        let isLocked = false;
        const lockOverlay = document.getElementById('lock-overlay');

        document.addEventListener('keydown', (e) => {
            // Wenn '0' gedrückt wird
            if (e.key === '0') {
                isLocked = !isLocked; // Status umschalten

                if (isLocked) {
                    // Versuche Vollbild zu aktivieren
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.log(`Fehler beim Aktivieren des Vollbildmodus: ${err.message}`);
                        });
                    }
                    lockOverlay.classList.add('hidden');
                } else {
                    // Vollbild beenden
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                    lockOverlay.classList.add('hidden');
                }
            }

            // Verhindere Standard-Shortcuts, wenn das System "gesperrt" ist
            if (isLocked) {
                if (['F11', 'F12'].includes(e.key)) {
                    e.preventDefault();
                }
            }
        });

        // Überwache Änderungen am Vollbild-Status
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isLocked) {
                lockOverlay.classList.remove('hidden');
            } else if (document.fullscreenElement) {
                lockOverlay.classList.add('hidden');
            }
        });

        // Verhindere Rechtsklick für mehr Kiosk-Feeling
        document.addEventListener('contextmenu', event => event.preventDefault());

        // --- 2. Login Logik ---
        let currentDigits = [0, 0, 0, 0, 0];

        function incrementDigit(index) {
            currentDigits[index] = (currentDigits[index] + 1) % 10;
            updateDigitDisplay(index);
        }

        function decrementDigit(index) {
            currentDigits[index] = (currentDigits[index] - 1 + 10) % 10;
            updateDigitDisplay(index);
        }

        function updateDigitDisplay(index) {
            const digitDisplays = document.querySelectorAll('.digit-display');
            digitDisplays[index].innerText = currentDigits[index];
        }

        function checkPassword() {
            const password = currentDigits.join('');

            if (password === "12345") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('desktop-screen').classList.remove('hidden');
            } else {
                const flash = document.getElementById('error-flash');
                const loginScreen = document.getElementById('login-screen');
                
                flash.classList.remove('flash-error');
                void flash.offsetWidth;
                flash.classList.add('flash-error');
                
                loginScreen.classList.add('animate-shake');
                setTimeout(() => loginScreen.classList.remove('animate-shake'), 500);
            }
        }

        // --- 3. Desktop App Logik ---
        function openApp(appId) {
            document.getElementById(appId).classList.remove('hidden');
        }

        function closeApp(appId) {
            document.getElementById(appId).classList.add('hidden');
        }
    </script>
</body>
</html>
